name: Upload File to Release

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: 'Direct download URL'
        required: true
        type: string
      file_name:
        description: 'Output filename'
        required: false
        type: string

# 👇 این بخش رو اضافه کن
permissions:
  contents: write

jobs:
  upload:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Download file
        run: |
          FILENAME=$(basename "${{ inputs.file_url }}")
          if [ -n "${{ inputs.file_name }}" ]; then
            FILENAME="${{ inputs.file_name }}"
          fi
          echo "FILENAME=$FILENAME" >> $GITHUB_ENV
          curl -L -o "$FILENAME" "${{ inputs.file_url }}"
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "Release ${{ github.run_number }}"
          files: ${{ env.FILENAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Get Download Link
        run: |
          echo "📥 Download Link:"
          echo "https://github.com/${{ github.repository }}/releases/download/v${{ github.run_number }}/${{ env.FILENAME }}"
