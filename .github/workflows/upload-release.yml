name: Upload File to Repository

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: 'Direct download URL'
        required: true
        type: string
      file_name:
        description: 'Output filename'
        required: true
        type: string

# 👇 این بخش رو حتما اضافه کن
permissions:
  contents: write
  pull-requests: write

jobs:
  upload:
    runs-on: ubuntu-latest
    # 👇 این رو هم اضافه کن
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          # sparse-checkout رو حذف کن
          fetch-depth: 0
      
      - name: Download file
        run: |
          mkdir -p uploads
          curl -L -o "uploads/${{ inputs.file_name }}" "${{ inputs.file_url }}"
      
      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Upload ${{ inputs.file_name }}"
          file_pattern: "uploads/*"
          # 👇 این رو اضافه کن
          push_options: "--force"
      
      - name: Show Download Link
        run: |
          echo "✅ File uploaded successfully!"
          echo ""
          echo "📥 Download Links:"
          echo "Raw:   https://raw.githubusercontent.com/${{ github.repository }}/main/uploads/${{ inputs.file_name }}"
          echo "Page:  https://github.com/${{ github.repository }}/blob/main/uploads/${{ inputs.file_name }}"
