name: Upload File to Repository

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: 'Direct download URL'
        required: true
        type: string
      file_name:
        description: 'Output filename'
        required: true
        type: string

permissions:
  contents: write

jobs:
  upload:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          sparse-checkout: |
            uploads
          sparse-checkout-cone-mode: false
      
      - name: Download file
        run: |
          mkdir -p uploads
          curl -L -o "uploads/${{ inputs.file_name }}" "${{ inputs.file_url }}"
      
      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Upload ${{ inputs.file_name }}"
          file_pattern: "uploads/*"
      
      - name: Show Download Link
        run: |
          echo "✅ File uploaded successfully!"
          echo ""
          echo "📥 Download Links:"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Raw:   https://raw.githubusercontent.com/${{ github.repository }}/main/uploads/${{ inputs.file_name }}"
          echo "Page:  https://github.com/${{ github.repository }}/blob/main/uploads/${{ inputs.file_name }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "::notice title=Download Link::https://raw.githubusercontent.com/${{ github.repository }}/main/uploads/${{ inputs.file_name }}"
